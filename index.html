<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡生活 5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fcfcfd; color: #1e293b; letter-spacing: 0.02em; }
        .section-card { @apply bg-white p-8 rounded-[40px] shadow-sm mb-8 border border-gray-50; }
        .main-title { @apply text-2xl font-black mb-6 pl-2; }
        .input-wrapper { @apply mb-6; }
        .label-text { @apply block text-sm font-bold text-slate-500 mb-2 ml-1; }
        .input-field { @apply w-full border-none bg-slate-100 p-4 rounded-2xl focus:bg-white focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-lg; }
        .btn-submit { @apply w-full py-5 rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-transform; }
        .time-box { @apply flex items-center justify-between bg-indigo-50 p-4 rounded-2xl mb-6 text-indigo-600 font-bold; }
    </style>
</head>
<body class="pb-32 pt-8">

<div class="max-w-md mx-auto px-6">
    <h1 class="main-title text-indigo-950">我的生活誌</h1>

    <section class="section-card">
        <div class="flex items-center mb-6">
            <span class="text-3xl mr-2">🌿</span>
            <h2 class="text-xl font-black text-emerald-700">健康生活</h2>
        </div>
        
        <div class="time-box">
            <span>📅 紀錄時間</span>
            <input type="datetime-local" id="health-time" class="bg-transparent outline-none text-sm">
        </div>

        <div class="input-wrapper">
            <label class="label-text">當下狀態</label>
            <select id="health-sub" class="input-field" onchange="checkPeriod()">
                <option>飲食</option><option>看診</option><option>運動</option>
                <option>睡眠</option><option>排便</option><option>體重</option>
                <option>生理期-開始</option><option>生理期-結束</option><option>其他</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label class="label-text">吃進去的食物/飲水</label>
            <input type="text" id="health-food" placeholder="例如：溫開水 500ml" class="input-field">
        </div>

        <div class="input-wrapper">
            <label class="label-text">身體症狀與感受</label>
            <input type="text" id="health-symptom" placeholder="例如：胃脹氣、牙痛" class="input-field">
        </div>

        <div class="input-wrapper">
            <label class="label-text">客觀內容備註</label>
            <textarea id="health-note" placeholder="運動內容、藥單資訊..." class="input-field h-32"></textarea>
        </div>

        <div class="flex gap-4">
            <button id="timer-btn" onclick="toggleTimer()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">計時</button>
            <button onclick="saveHealth()" class="flex-[2] btn-submit bg-emerald-600 text-white">儲存紀錄</button>
        </div>
        <p id="timer-display" class="text-center text-xs mt-3 text-slate-400"></p>
    </section>

    <section class="section-card">
        <div class="flex items-center mb-6">
            <span class="text-3xl mr-2">💳</span>
            <h2 class="text-xl font-black text-indigo-700">生活開銷</h2>
        </div>

        <div class="time-box">
            <span>📅 消費時間</span>
            <input type="datetime-local" id="fin-time" class="bg-transparent outline-none text-sm">
        </div>

        <div class="input-wrapper">
            <label class="label-text">消費類別</label>
            <select id="fin-sub" class="input-field" onchange="updateBudget()">
                <option>約會</option><option>飲食</option><option>油費/交通</option>
                <option>水電瓦斯電費公費</option><option>手機</option><option>其餘家用開銷</option>
                <option>醫療</option><option>運動</option><option>物理治療/美甲/醫美</option>
                <option>上課</option><option>日用品</option><option>購物</option>
                <option>保險稅等費用</option><option>其他</option>
            </select>
        </div>

        <div class="grid grid-cols-1 gap-6 mb-6">
            <div>
                <label class="label-text">支出金額</label>
                <input type="number" id="fin-amount" class="input-field" placeholder="$ 0">
            </div>
            <div>
                <label class="label-text">支付方式</label>
                <select id="fin-pay" class="input-field">
                    <option>現金</option><option>LINE Pay</option><option>Apple Pay</option>
                    <option>台灣Pay</option><option>街口</option>
                </select>
            </div>
        </div>

        <div class="input-wrapper">
            <label class="label-text">項目明細與說明</label>
            <input type="text" id="fin-item" placeholder="具體買了什麼？" class="input-field">
        </div>

        <div id="budget-left" class="bg-indigo-50 p-4 rounded-2xl text-center font-bold text-indigo-600 mb-6"></div>
        <button onclick="saveFinance()" class="btn-submit bg-indigo-600 text-white">儲存開銷</button>
    </section>

    <section class="section-card">
        <div class="flex items-center mb-6">
            <span class="text-3xl mr-2">🛍️</span>
            <h2 class="text-xl font-black text-rose-600">購物紀錄</h2>
        </div>

        <div class="time-box" style="background-color: #fff1f2; color: #e11d48;">
            <span>📅 購買時間</span>
            <input type="datetime-local" id="buy-time" class="bg-transparent outline-none text-sm">
        </div>

        <div class="input-wrapper">
            <label class="label-text">物品類別</label>
            <select id="buy-sub" class="input-field">
                <option>日常用品</option><option>衣服</option><option>包包</option>
                <option>飾品</option><option>鞋子</option><option>化妝品</option>
                <option>保養品</option><option>手作材料</option><option>商品庫存</option>
                <option>報名的課程</option><option>其他</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label class="label-text">品項名稱</label>
            <input type="text" id="buy-name" class="input-field" placeholder="請輸入物品名稱">
        </div>

        <div class="input-wrapper">
            <label class="label-text">金額</label>
            <input type="number" id="buy-amount" class="input-field" placeholder="$">
        </div>

        <div class="input-wrapper">
            <label class="label-text">店家</label>
            <input type="text" id="buy-shop" class="input-field" placeholder="購買通路/店名">
        </div>

        <div class="input-wrapper">
            <label class="label-text">詳細說明 (尺寸、材質、庫存...)</label>
            <textarea id="buy-note
