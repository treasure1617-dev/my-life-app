<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡生活管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

<div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">極簡生活</h1>
        <button onclick="exportToExcel()" class="bg-indigo-500 px-3 py-1 rounded text-sm">匯出 Excel</button>
    </header>

    <div class="p-4 grid grid-cols-3 gap-2 bg-indigo-50">
        <div class="bg-white p-2 rounded shadow text-center">
            <p class="text-xs text-gray-500">今日飲水</p>
            <p id="dash-water" class="text-lg font-bold text-blue-600">0 ml</p>
        </div>
        <div class="bg-white p-2 rounded shadow text-center">
            <p class="text-xs text-gray-500">今日運動</p>
            <p id="dash-sport" class="text-lg font-bold text-green-600">0 min</p>
        </div>
        <div class="bg-white p-2 rounded shadow text-center">
            <p class="text-xs text-gray-500">睡眠時間</p>
            <p id="dash-sleep" class="text-lg font-bold text-purple-600">0 hr</p>
        </div>
    </div>

    <main class="p-4">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">類別</label>
            <select id="main-cat" class="w-full border p-2 rounded bg-white">
                <option value="健康">健康 (飲食/飲水/看診)</option>
                <option value="生活">生活 (運動/睡眠/體重/生理期)</option>
                <option value="財務">財務 (支出/預算)</option>
                <option value="物品">物品 (庫存/購物)</option>
            </select>
        </div>

        <div id="dynamic-fields" class="space-y-3">
            <input type="text" id="field-content" placeholder="內容 (如：晚餐內容、藥單、診所)" class="w-full border p-2 rounded">
            <div class="flex gap-2">
                <input type="number" id="field-value" placeholder="數值" class="w-1/2 border p-2 rounded">
                <input type="text" id="field-unit" placeholder="單位 (ml/min/元)" class="w-1/2 border p-2 rounded">
            </div>
            <textarea id="field-note" placeholder="備註觀察、症狀說明..." class="w-full border p-2 rounded h-20"></textarea>
            <input type="datetime-local" id="field-time" class="w-full border p-2 rounded">
        </div>

        <button onclick="saveRecord()" class="w-full bg-indigo-600 text-white py-3 rounded-xl mt-4 font-bold shadow-lg active:scale-95 transition">儲存紀錄</button>
    </main>

    <section class="p-4 border-t">
        <div class="flex justify-between items-center mb-2">
            <h2 class="font-bold">歷史清單 (本月)</h2>
            <input type="month" id="query-month" onchange="renderList()" class="border text-sm p-1 rounded">
        </div>
        <div id="record-list" class="space-y-2 text-sm">
            </div>
    </section>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('life_logs')) || [];

    // 初始化時間
    document.getElementById('field-time').value = new Date().toISOString().slice(0, 16);

    function saveRecord() {
        const record = {
            id: Date.now(),
            time: document.getElementById('field-time').value,
            cat: document.getElementById('main-cat').value,
            content: document.getElementById('field-content').value,
            value: parseFloat(document.getElementById('field-value').value) || 0,
            unit: document.getElementById('field-unit').value,
            note: document.getElementById('field-note').value
        };
        
        records.unshift(record);
        localStorage.setItem('life_logs', JSON.stringify(records));
        updateDashboard();
        renderList();
        alert('儲存成功！');
    }

    function updateDashboard() {
        const today = new Date().toISOString().split('T')[0];
        const todayRecords = records.filter(r => r.time.startsWith(today));
        
        const water = todayRecords.filter(r => r.content.includes('水') || r.unit === 'ml').reduce((a, b) => a + b.value, 0);
        const sport = todayRecords.filter(r => r.cat === '生活' && r.unit === 'min').reduce((a, b) => a + b.value, 0);
        const sleep = todayRecords.filter(r => r.cat === '生活' && r.unit === 'hr').reduce((a, b) => a + b.value, 0);

        document.getElementById('dash-water').innerText = water + ' ml';
        document.getElementById('dash-sport').innerText = sport + ' min';
        document.getElementById('dash-sleep').innerText = sleep + ' hr';
    }

    function renderList() {
        const queryMonth = document.getElementById('query-month').value || new Date().toISOString().slice(0, 7);
        const listEl = document.getElementById('record-list');
        listEl.innerHTML = '';

        records.filter(r => r.time.startsWith(queryMonth)).forEach(r => {
            const div = document.createElement('div');
            div.className = "p-3 bg-white border-b flex justify-between";
            div.innerHTML = `
                <div>
                    <p class="font-bold text-indigo-700">${r.cat} - ${r.content}</p>
                    <p class="text-xs text-gray-400">${r.time}</p>
                    <p class="text-sm text-gray-600">${r.note}</p>
                </div>
                <div class="text-right">
                    <p class="font-bold">${r.value} ${r.unit}</p>
                </div>
            `;
            listEl.appendChild(div);
        });
    }

    function exportToExcel() {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "時間,類別,內容,數值,單位,備註\n";
        
        records.forEach(r => {
            csvContent += `${r.time},${r.cat},${r.content},${r.value},${r.unit},${r.note.replace(/\n/g, ' ')}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `生活紀錄_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
    }

    // 啟動執行
    updateDashboard();
    renderList();
</script>
</body>
</html>
